version: '3.8'

services:
  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: crypto-arb-openclaw
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - .env
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw-config:/home/node/.openclaw
      - ./workspace:/home/node/openclaw/workspace
    networks:
      - arb-network
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openclaw-config:

networks:
  arb-network:
    driver: bridge
