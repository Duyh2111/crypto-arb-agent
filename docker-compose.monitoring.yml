version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: arb-prometheus
    restart: unless-stopped
    volumes:
      - ./workspace/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - arb-network

  grafana:
    image: grafana/grafana:latest
    container_name: arb-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - arb-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  arb-network:
    external: true
